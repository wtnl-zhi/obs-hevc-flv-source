name: Build release packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build and update (for example v0.1.4)
        required: false
        type: string

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows x64
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin
        uses: ./.github/actions/build-plugin
        with:
          target: x64
          config: RelWithDebInfo

      - name: Create install archive
        run: |
          $archive = "release/obs-hevc-flv-source-windows-x64.zip"
          if (Test-Path $archive) { Remove-Item $archive -Force }
          Compress-Archive -Path "release/RelWithDebInfo/obs-hevc-flv-source" -DestinationPath $archive -CompressionLevel Optimal

      - name: Upload Windows plugin
        uses: actions/upload-artifact@v4
        with:
          name: obs-hevc-flv-source-windows-x64
          path: release/obs-hevc-flv-source-windows-x64.zip
          if-no-files-found: error

  package-macos:
    name: Package macOS Universal
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Configure macOS build
        run: cmake --preset macos-ci

      - name: Build macOS plugin
        run: cmake --build --preset macos-ci

      - name: Create install archive
        run: |
          cmake --install build_macos --config RelWithDebInfo --prefix "$GITHUB_WORKSPACE/release"
          ditto -c -k --sequesterRsrc --keepParent \
            "release/obs-hevc-flv-source.plugin" \
            "release/obs-hevc-flv-source-macos-universal.zip"

      - name: Upload macOS plugin
        uses: actions/upload-artifact@v4
        with:
          name: obs-hevc-flv-source-macos-universal
          path: release/obs-hevc-flv-source-macos-universal.zip
          if-no-files-found: error

  publish-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    needs: [package-windows, package-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG"; then
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip --generate-notes
          fi
